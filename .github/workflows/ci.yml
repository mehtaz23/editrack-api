name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --warnaserror

      - name: Test
        run: dotnet test --no-build --logger "GitHubActions;summary.includePassedTests=false"

      - name: Format check
        run: dotnet format --verify-no-changes
